name: Code Quality

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

permissions:
  contents: read
  packages: write

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 - --version 1.8.0
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Cache virtual environment
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('**/pyproject.toml', '**/poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-

      - name: Configure Poetry
        run: poetry config virtualenvs.in-project true

      - name: Install dependencies
        # --with dev,training so tests that import azure.ai.ml / mlflow / typer can collect.
        # Doesn't affect Docker image size; only the test runner installs these.
        run: poetry install --with dev,training --no-interaction

      - name: Run Black
        run: poetry run black --check src/

      - name: Run Flake8
        run: poetry run flake8 src/

      - name: Run MyPy
        run: poetry run mypy src/

      - name: Run Tests with Coverage
        run: poetry run pytest --cov=src --cov-report=term-missing --cov-fail-under=90
