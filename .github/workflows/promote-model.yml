name: Finalize Completed Azure ML Sweeps

on:
  # Automatic Azure ML sweep finalization is disabled. Run manually from the Actions tab when needed.
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  finalize-sweeps:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 - --version 1.8.0
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: |
          poetry config virtualenvs.in-project true
          poetry install --with training --no-interaction

      - name: Finalize completed sweeps
        env:
          AZURE_AUTH_MODE: default
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_ML_RESOURCE_GROUP }}
          AZURE_WORKSPACE: ${{ vars.AZURE_WORKSPACE }}
        run: |
          poetry run python scripts/finalize_completed_sweeps.py --yes
